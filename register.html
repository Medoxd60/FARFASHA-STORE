<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>تسجيل جديد - FARFASHA</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="navbar">
      <a class="brand" href="index.html"><span>FASHA</span>FAR</a>
    </div>
  </header>
  <main style="padding:80px 24px; max-width:760px; margin:0 auto;">
    <section class="section-page">
      <div class="section-title">
        <div>
          <h2>إنشاء حساب جديد</h2>
          <p>سجل حسابك لتحصل على تجربة شخصية ومتابعة الطلبات.</p>
        </div>
      </div>

      <article class="form-card" style="margin-top:18px;">
        <div class="auth-tabs" style="margin-bottom:12px;">
          <button id="tab-login" class="auth-tab" type="button">تسجيل الدخول</button>
          <button id="tab-register" class="auth-tab active" type="button">إنشاء حساب</button>
        </div>

        <div id="panel-login" class="auth-panel">
          <form id="login-form">
            <label>البريد الإلكتروني<input id="login-email" type="email" placeholder="example@email.com" required></label>
            <label>كلمة المرور<input id="login-password" type="password" placeholder="كلمة المرور" required></label>
            <div style="display:flex; gap:12px; margin-top:12px;">
              <button class="btn" type="submit">دخول</button>
              <a class="secondary-btn" href="index.html">العودة</a>
            </div>
            <p id="login-msg" class="alert" style="margin-top:12px; display:none;"></p>
          </form>
        </div>

        <div id="panel-register" class="auth-panel active">
          <form id="register-form">
            <label>الاسم الكامل<input id="reg-name" type="text" placeholder="اسمك الكامل" required></label>
            <label>رقم التليفون<input id="reg-phone" type="tel" placeholder="010XXXXXXXX" required></label>
            <label>البريد الإلكتروني<input id="reg-email" type="email" placeholder="example@email.com" required></label>
            <label>كلمة المرور<input id="reg-password" type="password" placeholder="كلمة مرور قوية" required></label>
            <label>تأكيد كلمة المرور<input id="reg-confirm" type="password" placeholder="أعد كتابة كلمة المرور" required></label>
            <div style="display:flex; gap:12px; margin-top:12px;">
              <button class="btn" type="submit">إنشاء حساب</button>
              <a class="secondary-btn" href="index.html">العودة</a>
            </div>
            <p id="reg-msg" class="alert" style="margin-top:12px; display:none;"></p>
          </form>
        </div>
      </article>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>
  <script src="app.js"></script>
  <script>
    (async () => {
      if (typeof initAuthPage === 'function') {
        try {
          await initAuthPage();
        } catch (e) {
          console.warn('initAuthPage failed:', e.message);
        }
      } else {
        console.warn('initAuthPage not found in app.js');
      }
    })();
  </script>
</body>
</html>
